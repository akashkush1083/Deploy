name: CI/CD to Kubernetes

on:
push:
branches:
  - main

jobs:
deploy:
runs-on: ubuntu-latest

steps:
  - name: Checkout Code
    uses: actions/checkout@v3

  - name: Login to Docker Hub
    run: |
      echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

  - name: Build Docker Image
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/project .

  - name: Push Docker Image
    run: |
      docker push ${{ secrets.DOCKER_USERNAME }}/project

  - name: Deploy to EC2
    uses: appleboy/ssh-action@v1
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ubuntu
      key: ${{ secrets.EC2_KEY }}
      script: |
        kubectl set image deployment/project-deployment project=${{ secrets.DOCKER_USERNAME }}/project
